[package]
name = "ext4-win-driver"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Browse and mount ext4 filesystems on Windows (CLI + WinFsp driver)"

[[bin]]
name = "ext4"
path = "src/main.rs"

[dependencies]
fs-ext4 = { path = "../rust-fs-ext4" }
clap = { version = "4", features = ["derive"] }
anyhow = "1"

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.59", features = [
    "Win32_Foundation",
    "Win32_Storage_FileSystem",
    "Win32_System_IO",
    "Win32_System_Ioctl",
    "Win32_Security",
] }
# winfsp = "0.10"  # enable in Phase C when adding mount support

[profile.release]
lto = true
codegen-units = 1
opt-level = 3
